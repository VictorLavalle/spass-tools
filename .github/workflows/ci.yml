name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: Decrypt .spass to CSV
        run: python scripts/spass_to_csv.py examples/sample_passwords.spass /tmp/decrypted.csv "Test1234!"
      - name: Encrypt CSV to .spass
        run: python scripts/csv_to_spass.py examples/sample_passwords.csv /tmp/encrypted.spass "Test1234!"
      - name: Roundtrip — re-decrypt and compare
        run: |
          python scripts/spass_to_csv.py /tmp/encrypted.spass /tmp/roundtrip.csv "Test1234!"
          diff <(sort examples/sample_passwords.csv) <(sort /tmp/roundtrip.csv) && echo "Roundtrip OK" || echo "Roundtrip differs (expected — column order may vary)"
